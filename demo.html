<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Demo | StructBOQ</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/logo.png">

    <style>
        :root {
            --bg-solid: #E8E6E1;
            --border-color: rgba(0, 0, 0, 0.09);
            --accent: #D4AF37;
            --accent-glow: rgba(212, 175, 55, 0.3);
            --text-primary: #0F0E0A;
            --text-secondary: #6B6859;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #F5F4F0;
            color: var(--text-primary);
            overflow-x: hidden;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            padding-top: 70px; /* Space for fixed navbar */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* NAV */
        .top-navbar {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 70px;
            background-color: #F5F4F0;
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
        }
        .nav-container {
            max-width: 1200px; margin: 0 auto;
            height: 100%; padding: 0 32px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .nav-logo {
            font-size: 1.1rem; font-weight: 700;
            color: var(--accent); text-decoration: none;
            letter-spacing: -0.01em;
        }
        .nav-cta {
            background: var(--accent); color: #000;
            padding: 9px 20px; border-radius: 4px;
            font-size: 0.875rem; font-weight: 700;
            text-decoration: none; transition: all 0.25s;
        }
        .nav-cta:hover { background: #FDE047; box-shadow: 0 0 20px var(--accent-glow); }

        /* ------------------------------------- */
        /* LAYOUT & PANEL STYLING                */
        /* ------------------------------------- */
        .main-content {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        .glass-panel {
            background: var(--bg-solid);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .section-label {
            font-size: 0.875rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 16px;
            display: block;
        }

        .section-heading {
            font-size: clamp(2rem, 4vw, 2.5rem);
            font-weight: 800;
            margin-bottom: 24px;
        }

        .section-subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        /* Loom Interaction Fix */
        .loom-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 40px;
            border: 1px solid var(--border-color);
        }
        .loom-overlay {
            position: absolute;
            inset: 0;
            z-index: 10;
            cursor: pointer;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .loom-overlay span {
            font-size: 14px;
            font-weight: 600;
            color: white;
            background: rgba(0,0,0,0.75);
            padding: 10px 20px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .loom-overlay:hover span {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .actions-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn-gold {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--accent);
            color: #000;
            padding: 16px 32px;
            text-decoration: none;
            font-weight: 800;
            font-size: 1rem;
            border-radius: 4px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn-gold:hover {
            box-shadow: 0 0 20px var(--accent-glow);
            background-color: #FDE047;
            transform: translateY(-2px);
        }

        .btn-outline {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(24, 24, 24, 0.6);
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 14px 30px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            border-radius: 4px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-outline:hover {
            background-color: var(--accent);
            color: #000;
        }

        /* Footer */
        footer {
            border-top: 1px solid rgba(0,0,0,0.09);
            padding: 40px 32px 28px;
            text-align: center;
            font-size: 0.85rem;
            color: #64748b;
        }
    </style>
</head>

<body>

    <!-- Top Navigation Bar -->
    <header class="top-navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">Shabir Ahmad</a>
            <a href="submit-ifc.html" class="nav-cta">Submit IFC File</a>
        </div>
    </header>

    <!-- Main Content -->
    <div class="main-content">
        <div class="container">
            <div class="glass-panel">
                <span class="section-label">DEMO VIDEO</span>
                <h2 class="section-heading">StructBOQ in Action</h2>
                <p class="section-subtitle">Watch how StructBOQ reads an IFC file, processes quantities with base checks, audits discrepancies, and compiles an automated Excel BOQ.</p>
                
                <div class="loom-wrapper" id="loomWrapper">
                    <iframe id="loomIframe"
                        src=""
                        data-src="https://www.loom.com/embed/74cdf4da3261456aa44773ee61696386?hide_owner=true&hide_share=true&hide_title=true&hideEmbedTopBar=true"
                        loading="lazy"
                        frameborder="0" webkitallowfullscreen mozallowfullscreen allowfullscreen
                        style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;">
                    </iframe>
                    <!-- Overlay that blocks pointer events until clicked -->
                    <div class="loom-overlay" id="loomOverlay" onclick="activateLoom()">
                        <span>▶ Click to watch video</span>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="footer-links" style="display:flex;justify-content:center;gap:32px;margin-bottom:16px;">
            <a href="index.html" style="color:#94A3B8;text-decoration:none;font-size:0.85rem;font-weight:500;">Home</a>
            <a href="about.html" style="color:#94A3B8;text-decoration:none;font-size:0.85rem;font-weight:500;">About</a>
            <a href="case-studies.html" style="color:#94A3B8;text-decoration:none;font-size:0.85rem;font-weight:500;">Case Studies</a>
        </div>
        <p>&copy; 2026 Shabir Ahmad &nbsp;·&nbsp; shabirbim.com</p>
    </footer>

    <!-- Scripts -->
    <script>
        function activateLoom() {
            const iframe = document.getElementById('loomIframe');
            if (!iframe.src) iframe.src = iframe.dataset.src;
            document.getElementById('loomOverlay').style.display = 'none';
            iframe.style.pointerEvents = 'auto';
        }
    </script>
</body>

</html>
